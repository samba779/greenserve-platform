<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - GreenServe</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-leaf"></i>
                <span>GreenServe</span>
            </a>
        </div>
    </nav>

    <!-- Forgot Password Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter your email address and we'll send you a link to reset your password</p>
            </div>

            <form id="forgotPasswordForm" data-submit="true">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" placeholder="Enter your email address" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full" data-original-text="Send Reset Link">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <div class="form-footer">
                Remember your password? <a href="login.html">Sign In</a>
            </div>

            <div class="form-footer" style="margin-top: 1rem;">
                <a href="register.html" style="color: var(--gray-500);">
                    <i class="fas fa-arrow-left"></i> Back to Sign Up
                </a>
            </div>
        </div>
    </section>

    <script src="js/app.js"></script>
    <script>
        // Handle forgot password form submission
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('forgotPasswordForm');
            
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const submitBtn = form.querySelector('[type="submit"]');
                    const email = form.querySelector('[name="email"]').value;
                    
                    // Disable button and show loading
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                    
                    // Send to backend
                    fetch('https://greenserve-platform.onrender.com/api/auth/forgot-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ email })
                    })
                    .then(response => response.json())
                    .then(result => {
                        if (result.success) {
                            showToast('Password reset link sent to your email', 'success');
                            // Redirect to login after 2 seconds
                            setTimeout(() => {
                                window.location.href = 'login.html';
                            }, 2000);
                        } else {
                            showToast(result.message || 'Failed to send reset link', 'error');
                        }
                    })
                    .catch(error => {
                        showToast('Failed to send reset link. Please try again.', 'error');
                    })
                    .finally(() => {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
                    });
                });
            }
        });
    </script>
</body>
</html>
