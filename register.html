<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GreenServe</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="google-signin-client_id" content="203912734078-ajteh37er9cbpd0uc9b2neck0osdi57m.apps.googleusercontent.com">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-leaf"></i>
                <span>GreenServe</span>
            </a>
        </div>
    </nav>

    <!-- Register Form -->
    <div class="form-container">
        <div class="form-header">
            <h2>Create Account</h2>
            <p>Join GreenServe for eco-friendly services</p>
        </div>

        <form id="registerForm" data-submit="true" data-redirect="otp-verify.html">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-input" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-input" placeholder="Last name" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="form-input" placeholder="+91 98765 43210" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" placeholder="Create a password (min 8 chars)" required minlength="8">
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" placeholder="Confirm your password" required>
            </div>

            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" required>
                    <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full" data-original-text="Create Account">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="form-divider">or sign up with</div>

        <div class="social-login">
            <button class="btn btn-social btn-full" onclick="handleGoogleSignIn()">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="btn btn-social btn-full">
                <i class="fab fa-apple"></i> Apple
            </button>
        </div>

        <div class="form-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>

        <div class="form-footer" style="margin-top: 1rem;">
            <a href="worker-register.html" style="color: var(--gray-500);">
                <i class="fas fa-briefcase"></i> Register as Worker
            </a>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/app.js"></script>
    <script>
        function handleGoogleSignIn() {
            window.location.href = 'https://greenserve-api.up.railway.app/api/auth/google';
        }

        // Handle Google OAuth callback
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const user = urlParams.get('user');
            
            if (token && user) {
                // Store token and user data
                localStorage.setItem('token', token);
                localStorage.setItem('user', decodeURIComponent(user));
                
                // Redirect to dashboard
                window.location.href = 'index.html';
            }
            
            const error = urlParams.get('error');
            if (error) {
                alert('Google sign up failed. Please try again.');
            }
        });
    </script>
</body>
</html>
