<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Registration - EcoWorkConnect</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-leaf"></i>
                <span>EcoWorkConnect</span>
            </a>
        </div>
    </nav>

    <!-- Worker Registration Form -->
    <div class="form-container" style="max-width: 600px;">
        <div class="form-header">
            <div style="width: 4rem; height: 4rem; background: var(--primary-light); color: var(--primary); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: 1.75rem; margin: 0 auto 1rem;">
                <i class="fas fa-briefcase"></i>
            </div>
            <h2>Become a EcoWorkConnect Partner</h2>
            <p>Join our network of verified service professionals</p>
        </div>

        <!-- Progress Steps -->
        <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem;">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 0.25rem;">
                <div style="width: 2rem; height: 2rem; background: var(--primary); color: white; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 600;">1</div>
                <span style="font-size: 0.75rem; color: var(--primary);">Personal</span>
            </div>
            <div style="width: 3rem; height: 2px; background: var(--gray-300); margin-top: 1rem;"></div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 0.25rem;">
                <div style="width: 2rem; height: 2rem; background: var(--gray-300); color: var(--gray-600); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 600;">2</div>
                <span style="font-size: 0.75rem; color: var(--gray-500);">Skills</span>
            </div>
            <div style="width: 3rem; height: 2px; background: var(--gray-300); margin-top: 1rem;"></div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 0.25rem;">
                <div style="width: 2rem; height: 2rem; background: var(--gray-300); color: var(--gray-600); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 600;">3</div>
                <span style="font-size: 0.75rem; color: var(--gray-500);">Documents</span>
            </div>
        </div>

        <form id="workerRegisterForm" data-submit="true" data-redirect="worker-portal.html">
            <h4 style="margin-bottom: 1rem; color: var(--gray-700);"><i class="fas fa-user"></i> Personal Information</h4>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First Name *</label>
                    <input type="text" class="form-input" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name *</label>
                    <input type="text" class="form-input" placeholder="Last name" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Mobile Number *</label>
                <input type="tel" class="form-input" placeholder="+91 98765 43210" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label class="form-label">City *</label>
                <select class="form-select" required>
                    <option value="">Select your city</option>
                    <option value="bangalore">Bangalore</option>
                    <option value="mumbai">Mumbai</option>
                    <option value="delhi">Delhi</option>
                    <option value="hyderabad">Hyderabad</option>
                    <option value="chennai">Chennai</option>
                    <option value="pune">Pune</option>
                </select>
            </div>

            <h4 style="margin: 1.5rem 0 1rem; color: var(--gray-700);"><i class="fas fa-tools"></i> Select Your Skills *</h4>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; border: 2px solid var(--gray-200); border-radius: var(--radius); cursor: pointer;">
                    <input type="checkbox" style="width: 1.125rem; height: 1.125rem; accent-color: var(--primary);">
                    <span>Solar Installation</span>
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; border: 2px solid var(--gray-200); border-radius: var(--radius); cursor: pointer;">
                    <input type="checkbox" style="width: 1.125rem; height: 1.125rem; accent-color: var(--primary);">
                    <span>Energy Audit</span>
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; border: 2px solid var(--gray-200); border-radius: var(--radius); cursor: pointer;">
                    <input type="checkbox" style="width: 1.125rem; height: 1.125rem; accent-color: var(--primary);">
                    <span>Bio-Gas Systems</span>
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; border: 2px solid var(--gray-200); border-radius: var(--radius); cursor: pointer;">
                    <input type="checkbox" style="width: 1.125rem; height: 1.125rem; accent-color: var(--primary);">
                    <span>Gardening</span>
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; border: 2px solid var(--gray-200); border-radius: var(--radius); cursor: pointer;">
                    <input type="checkbox" style="width: 1.125rem; height: 1.125rem; accent-color: var(--primary);">
                    <span>Waste Management</span>
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; border: 2px solid var(--gray-200); border-radius: var(--radius); cursor: pointer;">
                    <input type="checkbox" style="width: 1.125rem; height: 1.125rem; accent-color: var(--primary);">
                    <span>Water Conservation</span>
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; border: 2px solid var(--gray-200); border-radius: var(--radius); cursor: pointer;">
                    <input type="checkbox" style="width: 1.125rem; height: 1.125rem; accent-color: var(--primary);">
                    <span>EV Charging</span>
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; border: 2px solid var(--gray-200); border-radius: var(--radius); cursor: pointer;">
                    <input type="checkbox" style="width: 1.125rem; height: 1.125rem; accent-color: var(--primary);">
                    <span>Green Maintenance</span>
                </label>
            </div>

            <div class="form-group">
                <label class="form-label">Years of Experience *</label>
                <select class="form-select" required>
                    <option value="">Select experience</option>
                    <option value="0-1">Less than 1 year</option>
                    <option value="1-3">1-3 years</option>
                    <option value="3-5">3-5 years</option>
                    <option value="5-10">5-10 years</option>
                    <option value="10+">More than 10 years</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Create Password *</label>
                <input type="password" class="form-input" placeholder="Min 8 characters" required minlength="8">
            </div>

            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" required>
                    <span>I confirm that all information provided is accurate and I agree to the <a href="#">Terms of Service</a> and <a href="#">Partner Agreement</a></span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg" data-original-text="Complete Registration">
                <i class="fas fa-user-plus"></i> Complete Registration
            </button>
        </form>

        <div class="form-footer">
            Already registered? <a href="worker-login.html">Sign in</a>
        </div>

        <div class="form-footer" style="margin-top: 1rem;">
            <a href="register.html" style="color: var(--gray-500);">
                <i class="fas fa-user"></i> Register as Customer
            </a>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
