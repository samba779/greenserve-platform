<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GreenServe</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="google-signin-client_id" content="203912734078-ajteh37er9cbpd0uc9b2neck0osdi57m.apps.googleusercontent.com">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-leaf"></i>
                <span>GreenServe</span>
            </a>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="form-container">
        <div class="form-header">
            <h2>Welcome Back</h2>
            <p>Sign in to book green services</p>
        </div>

        <form id="loginForm" data-submit="true" data-redirect="index.html">
            <div class="form-group">
                <label class="form-label">Email or Mobile Number</label>
                <input type="text" class="form-input" placeholder="Enter email or mobile" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" placeholder="Enter your password" required>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label class="form-checkbox">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" style="font-size: 0.875rem; color: var(--primary);">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" data-original-text="Sign In">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="form-divider">or continue with</div>

        <div class="social-login">
            <button class="btn btn-social btn-full" onclick="handleGoogleSignIn()">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="btn btn-social btn-full">
                <i class="fab fa-apple"></i> Apple
            </button>
        </div>

        <div class="form-footer">
            Don't have an account? <a href="register.html">Sign up</a>
        </div>

        <div class="form-footer" style="margin-top: 1rem;">
            <a href="worker-login.html" style="color: var(--gray-500);">
                <i class="fas fa-briefcase"></i> Login as Worker
            </a>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/app.js"></script>
    <script>
        function handleGoogleSignIn() {
            window.location.href = 'https://greenserve-api.up.railway.app/api/auth/google';
        }

        // Handle Google OAuth callback
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const user = urlParams.get('user');
            
            if (token && user) {
                // Store token and user data
                localStorage.setItem('token', token);
                localStorage.setItem('user', decodeURIComponent(user));
                
                // Redirect to dashboard
                window.location.href = 'index.html';
            }
            
            const error = urlParams.get('error');
            if (error) {
                alert('Google sign in failed. Please try again.');
            }
        });
    </script>
</body>
</html>
