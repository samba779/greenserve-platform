<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Login - EcoWorkConnect</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-leaf"></i>
                <span>EcoWorkConnect</span>
            </a>
        </div>
    </nav>

    <!-- Worker Login Form -->
    <div class="form-container">
        <div class="form-header">
            <div style="width: 4rem; height: 4rem; background: var(--primary-light); color: var(--primary); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: 1.75rem; margin: 0 auto 1rem;">
                <i class="fas fa-briefcase"></i>
            </div>
            <h2>Worker Login</h2>
            <p>Access your EcoWorkConnect partner account</p>
        </div>

        <form id="workerLoginForm" data-submit="true" data-redirect="worker-portal.html">
            <div class="form-group">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="form-input" placeholder="Enter registered mobile number" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" placeholder="Enter your password" required>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label class="form-checkbox">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" style="font-size: 0.875rem; color: var(--primary);">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" data-original-text="Sign In">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="form-divider">or</div>

        <div class="form-footer">
            Don't have a worker account? <a href="worker-register.html">Register as Partner</a>
        </div>

        <div class="form-footer" style="margin-top: 1rem;">
            <a href="login.html" style="color: var(--gray-500);">
                <i class="fas fa-user"></i> Login as Customer
            </a>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
