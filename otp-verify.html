<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - EcoWorkConnect</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-leaf"></i>
                <span>EcoWorkConnect</span>
            </a>
        </div>
    </nav>

    <!-- OTP Verification -->
    <div class="form-container">
        <div class="form-header">
            <h2>Verify Your Number</h2>
            <p>Enter the 6-digit code sent to your mobile number</p>
        </div>

        <form id="otpForm" data-submit="true" data-redirect="index.html">
            <!-- Hidden fields for OTP and mobile -->
            <input type="hidden" name="otp" id="otpValue">
            <input type="hidden" name="mobile" id="mobileValue">
            
            <div class="otp-inputs">
                <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" required>
                <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" required>
                <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" required>
                <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" required>
                <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" required>
                <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" required>
            </div>

            <div class="otp-timer" id="otpTimer">
                <i class="fas fa-clock"></i>
                <span id="timerText">Resend code in 60s</span>
            </div>

            <button type="submit" class="btn btn-primary btn-full" data-original-text="Verify">
                <i class="fas fa-check-circle"></i> Verify
            </button>
        </form>

        <div class="form-footer">
            Didn't receive the code? 
            <a href="#" id="resendLink" onclick="resendOTP()" style="display: none;">Resend</a>
            <span id="resendTimer">Please wait...</span>
        </div>

        <div class="form-footer" style="margin-top: 0.5rem; font-size: 0.75rem;">
            <a href="login.html">Change number</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Show actual mobile number from URL and set hidden field
        const urlParams = new URLSearchParams(window.location.search);
        const mobile = urlParams.get('mobile');
        
        if (mobile) {
            const mobileText = document.querySelector('.form-header p');
            if (mobileText) {
                mobileText.textContent = `Enter 6-digit code sent to ${mobile}`;
            }
            // Set hidden mobile field
            document.getElementById('mobileValue').value = mobile;
        }
        
        // Combine OTP digits and submit
        function submitOTPForm() {
            const inputs = document.querySelectorAll('.otp-input');
            let otpValue = '';
            inputs.forEach(input => {
                otpValue += input.value;
            });
            
            if (otpValue.length === 6) {
                document.getElementById('otpValue').value = otpValue;
                // Trigger the form submission through app.js handler
                const form = document.getElementById('otpForm');
                const submitEvent = new Event('submit', { bubbles: true, cancelable: true });
                form.dispatchEvent(submitEvent);
            }
        }
        
        // Auto-detect OTP from SMS (Android only)
        function detectOTPFromSMS() {
            if ('sms' in navigator && 'getMessages' in navigator.sms) {
                navigator.sms.getMessages()
                    .then(messages => {
                        const recentMessage = messages.find(msg => 
                            msg.message && msg.message.includes('EcoWorkConnect OTP')
                        );
                        
                        if (recentMessage) {
                            const otpMatch = recentMessage.message.match(/\d{6}/);
                            if (otpMatch) {
                                fillOTP(otpMatch[0]);
                            }
                        }
                    })
                    .catch(err => console.log('SMS detection not available'));
            }
        }
        
        // Auto-fill OTP
        function fillOTP(otp) {
            const inputs = document.querySelectorAll('.otp-input');
            for (let i = 0; i < 6; i++) {
                if (i < otp.length) {
                    inputs[i].value = otp[i];
                }
            }
            
            // Auto-submit after filling using proper event
            setTimeout(() => {
                submitOTPForm();
            }, 500);
        }
        
        // Enhanced resend OTP
        function resendOTP() {
            if (countdown > 0) {
                showToast('Please wait before requesting new code', 'warning');
                return;
            }
            
            if (resendAttempts >= maxResendAttempts) {
                showToast('Maximum resend attempts reached. Please try again later', 'error');
                return;
            }
            
            if (!mobile) {
                showToast('Mobile number not found', 'error');
                return;
            }
            
            resendAttempts++;
            
            // Call backend to resend OTP
            fetch('https://greenserve-platform.onrender.com/api/auth/resend-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ mobile: mobile })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast('OTP resent successfully', 'success');
                    startCountdown(); // Restart countdown
                    detectOTPFromSMS(); // Try to detect new OTP
                } else {
                    showToast('Failed to resend OTP', 'error');
                }
            })
            .catch(error => {
                showToast('Error resending OTP', 'error');
            });
        }
        
        // Combine OTP digits and submit
        function submitOTPForm() {
            const inputs = document.querySelectorAll('.otp-input');
            let otpValue = '';
            inputs.forEach(input => {
                otpValue += input.value;
            });
            
            if (otpValue.length === 6) {
                document.getElementById('otpValue').value = otpValue;
                document.getElementById('otpForm').dispatchEvent(new Event('submit'));
            }
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            startCountdown();
            detectOTPFromSMS();
            
            // Add real-time validation
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                    
                    // Auto-submit when all 6 digits are entered
                    const allFilled = Array.from(inputs).every(inp => inp.value.length === 1);
                    if (allFilled) {
                        setTimeout(submitOTPForm, 300);
                    }
                });
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && index > 0 && !e.target.value) {
                        inputs[index - 1].focus();
                    }
                });
            });
        });
    </script>
</body>
</html>
